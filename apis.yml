apis:
  - aid: 8base:graphql-api
    name: 8base GraphQL API
    description: |
      The 8base GraphQL API provides auto-generated queries, mutations, and
      subscriptions for every data table in a workspace, covering full CRUD
      operations out-of-the-box. Each workspace is assigned a unique API endpoint
      at https://api.8base.com/<WORKSPACE_ID> and supports filtering, pagination,
      full-text search, relational queries, and extensibility through custom
      serverless functions.
    tags:
      - GraphQL
      - Serverless
      - Database
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.8base.com/backend/graphql-api/
    baseURL: https://api.8base.com
    properties:
